# Vision AI — Desktop Profile (NVIDIA GPU / 高性能工作站)
#
# 用法: python main.py --profile desktop
#
# 特点: CUDA GPU加速 / 640px检测 / ByteTrack匈牙利跟踪 / 全功能

profile: desktop

camera:
  index: 0
  width: 640
  height: 480
  api: null

detector:
  type: scrfd_onnx
  model_path: "models/scrfd_500m.onnx"
  input_size: 640
  conf_threshold: 0.5
  nms_threshold: 0.4
  detection_interval: 2
  device: cuda
  box_padding: 0.25
  box_shift_y: -0.25
  box_shift_x: -0.05

recognition:
  model_path: "models/w600k_mbf.onnx"
  recognition_threshold: 0.45
  recognition_cooldown: 180
  recognized_cooldown: 600
  failed_backoff: 90
  max_attempts: 20
  device: cuda
  min_face_size: 48
  blur_threshold: 80
  min_quality_score: 0.55
  max_queue_size: 8
  queue_pressure_threshold: 5
  enable_embedding_cache: true
  embedding_cache_ttl: 30
  max_cache_size: 128

tracking:
  enabled: true
  type: bytetrack
  track_thresh: 0.5
  max_disappeared: 30
  match_thresh: 0.8
  frame_rate: 30

pipeline:
  window_name: "Vision AI Desktop"
  quit_key: "q"
  fps_window_size: 30
  worker_queue_size: 8

database:
  path: "face_db/identities.pkl"

runtime:
  mode: desktop
  use_gpu: true
  enable_behavior: false
  enable_event_system: true
  enable_alert: true
  enable_reassociation: false
  enable_region: false

motion:
  threshold: 2.0
  history: 0
  force_interval: 15

scheduler:
  detection_interval: 2
  force_interval: 15
  adaptive: true
  target_fps: 30
  min_interval: 1
  max_interval: 5
  motion_boost_frames: 10

behavior:
  stationary_threshold: 60
  loitering_threshold: 300
  alert_cooldown: 30

regions: {}

pose:
  enabled: false

fall_detection:
  enabled: false

tensorrt:
  enabled: false

# === VisionTask Plugins ===

tasks:
  fall_detection:
    enabled: true
    backend: onnx
    model_path: "models/yolov8n-pose.onnx"
    device: cuda
    interval: 3
    input_size: 640
    confidence_threshold: 0.35
    fall:
      horizontal_ar_threshold: 0.6
      angle_threshold: 120
      torso_inclination_threshold: 65
      min_fall_pose_duration: 2.0
      window_size: 10
      window_trigger_ratio: 0.5
      min_consecutive_triggers: 3
    features:
      head_descent_window: 20
    tracking:
      ghost_timeout: 1.0
      fallen_ghost_timeout: 5.0

notification:
  enabled: true
  port: 8080
  update_interval: 30
  webhooks:
    enabled: false
    wecom_url: null
    dingtalk_url: null
    rate_limit: 60
  email:
    enabled: true
    smtp_host: "smtp.qq.com"
    smtp_port: 465
    username: "3049169447@qq.com"
    password: "gypvegbaxyztdgae"
    receiver: "3049169447@qq.com"
