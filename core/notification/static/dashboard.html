<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision AI — 监控仪表盘</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: #0d1117; color: #c9d1d9; min-height: 100vh; display: flex; flex-direction: column;
  }
  /* --- Top status bar --- */
  #status-bar {
    display: flex; gap: 16px; padding: 12px 24px;
    background: #161b22; border-bottom: 1px solid #30363d;
    font-size: 14px; align-items: center; flex-wrap: wrap;
  }
  .stat-item { display: flex; align-items: center; gap: 6px; }
  .stat-label { color: #8b949e; }
  .stat-value { color: #58a6ff; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stat-value.alerts { color: #f85149; }
  .stat-value.mem { color: #7ee787; }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 11px; font-weight: 600; background: #21262d; color: #c9d1d9;
  }
  .badge.online { background: #1f6feb; color: #fff; }
  .badge.offline { background: #21262d; color: #8b949e; }

  /* --- Main layout --- */
  #main { display: flex; flex: 1; overflow: hidden; }
  #panel-persons { width: 320px; min-width: 260px; border-right: 1px solid #30363d; display: flex; flex-direction: column; }
  #panel-events { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .panel-header {
    padding: 10px 16px; font-size: 13px; font-weight: 600; color: #8b949e;
    text-transform: uppercase; letter-spacing: 0.5px;
    background: #161b22; border-bottom: 1px solid #21262d;
  }

  /* --- Person list --- */
  #person-list { flex: 1; overflow-y: auto; padding: 8px; }
  .person-card {
    background: #161b22; border: 1px solid #30363d; border-radius: 6px;
    padding: 10px 12px; margin-bottom: 8px; transition: border-color 0.2s;
  }
  .person-card:hover { border-color: #58a6ff; }
  .person-card .name { font-weight: 600; font-size: 14px; color: #c9d1d9; }
  .person-card .name.unknown { color: #8b949e; font-style: italic; }
  .person-card .meta { font-size: 12px; color: #8b949e; margin-top: 4px; display: flex; gap: 12px; }
  .person-card .fall-status { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .fall-status.normal { background: #1b4332; color: #7ee787; }
  .fall-status.fallen { background: #5c0e12; color: #f85149; animation: pulse 1s infinite; }
  .fall-status.unknown { background: #21262d; color: #8b949e; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* --- Event timeline --- */
  #event-list { flex: 1; overflow-y: auto; padding: 8px; }
  .event-entry {
    display: flex; gap: 12px; padding: 8px 12px; margin-bottom: 4px;
    border-left: 3px solid #30363d; font-size: 13px; transition: background 0.15s;
  }
  .event-entry:hover { background: #161b22; }
  .event-entry .time { color: #8b949e; white-space: nowrap; font-variant-numeric: tabular-nums; min-width: 60px; }
  .event-entry .msg { flex: 1; word-break: break-all; }
  .event-entry.level-fall { border-left-color: #f85149; }
  .event-entry.level-fall .msg { color: #f85149; }
  .event-entry.level-warning { border-left-color: #d29922; }
  .event-entry.level-warning .msg { color: #d29922; }
  .event-entry.level-recovered { border-left-color: #7ee787; }
  .event-entry.level-recovered .msg { color: #7ee787; }
  .event-entry.level-info { border-left-color: #58a6ff; }
  .event-entry.level-info .msg { color: #58a6ff; }

  /* --- Empty state --- */
  .empty-state {
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: #30363d; font-size: 14px; flex-direction: column; gap: 8px;
  }
  .empty-state .icon { font-size: 32px; opacity: 0.5; }
  .empty-state .hint { color: #484f58; font-size: 12px; }

  /* --- Connection status --- */
  #conn-status {
    position: fixed; bottom: 16px; right: 16px;
    padding: 6px 14px; border-radius: 16px; font-size: 12px; font-weight: 600;
    background: #21262d; color: #8b949e; z-index: 100;
    border: 1px solid #30363d; backdrop-filter: blur(4px);
  }
  #conn-status.connected { background: #1b4332; color: #7ee787; border-color: #238636; }
  #conn-status.disconnected { background: #5c0e12; color: #f85149; border-color: #da3633; }
  #conn-status.connecting { background: #21262d; color: #d29922; border-color: #30363d; }

  /* --- Scrollbar --- */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #484f58; }

  /* --- Responsive --- */
  @media (max-width: 768px) {
    #status-bar { font-size: 12px; padding: 8px 12px; gap: 8px; }
    #panel-persons { width: 200px; min-width: 140px; }
  }
  @media (max-width: 480px) {
    #main { flex-direction: column; }
    #panel-persons { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid #30363d; max-height: 40vh; }
    #status-bar .stat-label { display: none; }
  }
</style>
</head>
<body>

<div id="status-bar">
  <div class="stat-item"><span class="stat-label">FPS</span><span class="stat-value" id="s-fps">0</span></div>
  <div class="stat-item"><span class="stat-label">人员</span><span class="stat-value" id="s-persons">0</span></div>
  <div class="stat-item"><span class="stat-label">告警</span><span class="stat-value alerts" id="s-alerts">0</span></div>
  <div class="stat-item"><span class="stat-label">内存</span><span class="stat-value mem" id="s-mem">0%</span></div>
  <div style="flex:1"></div>
  <span class="badge online" id="s-server-badge">Server</span>
</div>

<div id="main">
  <!-- Person panel -->
  <div id="panel-persons">
    <div class="panel-header">人员列表</div>
    <div id="person-list"></div>
  </div>

  <!-- Event panel -->
  <div id="panel-events">
    <div class="panel-header">事件时间线</div>
    <div id="event-list"></div>
  </div>
</div>

<div id="conn-status" class="connecting">连接中...</div>

<script>
(function () {
  'use strict';

  // ---- DOM refs ---------------------------------------------------------
  const elFps       = document.getElementById('s-fps');
  const elPersons   = document.getElementById('s-persons');
  const elAlerts    = document.getElementById('s-alerts');
  const elMem       = document.getElementById('s-mem');
  const elPersonList = document.getElementById('person-list');
  const elEventList  = document.getElementById('event-list');
  const elConn       = document.getElementById('conn-status');

  // ---- State ------------------------------------------------------------
  let ws = null;
  let reconnectTimer = null;
  let eventCount = 0;

  // ---- Helpers ----------------------------------------------------------
  function timeStr() {
    const d = new Date();
    return d.toLocaleTimeString('zh-CN', { hour12: false });
  }

  function escHtml(s) {
    const div = document.createElement('div');
    div.appendChild(document.createTextNode(s));
    return div.innerHTML;
  }

  function setConnStatus(state, text) {
    elConn.className = state;
    elConn.textContent = text;
  }

  // ---- Render helpers ---------------------------------------------------
  function renderStatus(data) {
    elFps.textContent = data.fps != null ? data.fps : '0';
    elPersons.textContent = data.persons != null ? data.persons : '0';
    elAlerts.textContent = data.fall_alerts != null ? data.fall_alerts : '0';
    elMem.textContent = data.mem || '0%';
  }

  function renderPersons(list) {
    if (!list || list.length === 0) {
      elPersonList.innerHTML =
        '<div class="empty-state"><div class="icon">&#128100;</div><div>暂无人员</div><div class="hint">等待检测结果...</div></div>';
      return;
    }
    var html = '';
    for (var i = 0; i < list.length; i++) {
      var p = list[i];
      var name = p.name || 'Unknown';
      var nameCls = name === 'Unknown' ? 'name unknown' : 'name';
      var tid = p.track_id || p.tid || '?';
      var behavior = p.behavior || '-';
      var fallCls = 'fall-status unknown';
      var fallLabel = '未知';
      if (p.fall_state === 'Normal' || p.fall_state === 'normal') {
        fallCls = 'fall-status normal'; fallLabel = '正常';
      } else if (p.fall_state === 'Fallen' || p.fall_state === 'fallen') {
        fallCls = 'fall-status fallen'; fallLabel = '跌倒!';
      } else if (p.fall_state) {
        fallCls = 'fall-status fallen'; fallLabel = escHtml(p.fall_state);
      }
      html += '<div class="person-card">' +
        '<div class="' + nameCls + '">' + escHtml(name) + '</div>' +
        '<div class="meta">' +
          'ID:' + escHtml(String(tid)) +
          ' <span>行为: ' + escHtml(behavior) + '</span>' +
          ' <span class="' + fallCls + '">' + fallLabel + '</span>' +
        '</div></div>';
    }
    elPersonList.innerHTML = html;
  }

  function renderEvent(data) {
    var level = data.level || 'info';
    var msg = data.msg || data.message || JSON.stringify(data);
    var ts = data.ts ? new Date(data.ts * 1000).toLocaleTimeString('zh-CN', { hour12: false }) : timeStr();

    var entry = document.createElement('div');
    entry.className = 'event-entry level-' + level;
    entry.innerHTML = '<span class="time">' + escHtml(ts) + '</span><span class="msg">' + escHtml(msg) + '</span>';

    elEventList.insertBefore(entry, elEventList.firstChild);

    // Keep max ~200 entries
    eventCount++;
    while (elEventList.children.length > 200) {
      elEventList.removeChild(elEventList.lastChild);
    }
  }

  // ---- WebSocket --------------------------------------------------------
  function connect() {
    if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    if (ws) { try { ws.close(); } catch (e) {} ws = null; }

    var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    var host = location.hostname || 'localhost';
    var port = location.port || '8080';
    var url = protocol + '//' + host + ':' + port + '/ws';

    setConnStatus('connecting', '连接中...');

    ws = new WebSocket(url);

    ws.onopen = function () {
      setConnStatus('connected', '已连接');
      // Fetch initial state via REST
      fetchStatus();
      fetchPersons();
      fetchEvents();
    };

    ws.onmessage = function (evt) {
      try {
        var msg = JSON.parse(evt.data);
      } catch (e) {
        return;
      }
      switch (msg.type) {
        case 'status':
          renderStatus(msg.data);
          break;
        case 'persons':
          renderPersons(msg.data);
          break;
        case 'event':
          renderEvent(msg.data);
          break;
        default:
          break;
      }
    };

    ws.onclose = function () {
      setConnStatus('disconnected', '已断开');
      ws = null;
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = function () {
      // onclose will fire next
    };
  }

  // ---- REST fallback (initial load) -------------------------------------
  function fetchStatus() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/status', true);
    xhr.onload = function () {
      if (xhr.status === 200) {
        try { renderStatus(JSON.parse(xhr.responseText)); } catch (e) {}
      }
    };
    xhr.send();
  }

  function fetchPersons() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/persons', true);
    xhr.onload = function () {
      if (xhr.status === 200) {
        try { renderPersons(JSON.parse(xhr.responseText)); } catch (e) {}
      }
    };
    xhr.send();
  }

  function fetchEvents() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/api/events', true);
    xhr.onload = function () {
      if (xhr.status === 200) {
        try {
          var events = JSON.parse(xhr.responseText);
          for (var i = events.length - 1; i >= 0; i--) {
            renderEvent(events[i]);
          }
        } catch (e) {}
      }
    };
    xhr.send();
  }

  // ---- Init -------------------------------------------------------------
  connect();
})();
</script>
</body>
</html>
